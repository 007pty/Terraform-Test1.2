name: 'Terraform Init and Apply'

on:
  workflow_call:
    inputs:
      directory:
        description: "Working directory name"
        type: string
        required: true

      environment:
        description: "Target Environment"
        type: string
        required: true

permissions:
  id-token: write
  contents: read

env:
  GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
  TF_VAR_proj_env: ${{ inputs.environment }}
  TF_VAR_tag_environment: ${{ inputs.environment }}
  TF_VAR_tag_repository: ${{ github.event.repository.name }}
  TF_VAR_github_repository_owner: ${{ github.repository_owner }}
  TF_VAR_github_repository_name: ${{ github.event.repository.name }}
  TF_VAR_github_environment_name: ""

jobs:
  approval:
    name: 'Approval'
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: approval
    steps:
      - name: Approval Step
        run: echo "${{ github.event.review.state }}"

  init-and-apply: 
    name: 'Apply'
    runs-on: ubuntu-latest
    needs: approval
    if: ${{ github.ref_name == 'main' && needs.approval.result == 'success' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate input directory
        run: |
          if [ -d ${{ inputs.directory }} ]; then
            echo "Directory exists"
          else 
            echo "Directory does not exist."
            exit 1
          fi

      - name: Set Github URL
        run: git config --global url."https://oauth2:${{ secrets.GH_ACCESS_TOKEN }}@github.com".insteadOf https://github.com
      
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODEJS_VERSION || '24' }}
          
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TERRAFORM_VERSION || '1.7.3' }}

      - name: Terraform Version confirmation
        run: terraform -version

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ inputs.directory }}

      - name: Terraform Apply        
        run: terraform apply -var-file="terraform.tfvars" -auto-approve
        working-directory: ${{ inputs.directory }}